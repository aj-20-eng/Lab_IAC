name: Deploy AKS Cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      resource_group:
        description: 'Resource Group name'
        required: true
        default: 'LAB'

permissions:
  id-token: write
  contents: read

env:
  LOCATION: centralindia

jobs:
  deploy-aks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate or Create Resource Group
        run: |
          RG_EXISTS=$(az group exists --name "${{ github.event.inputs.resource_group }}")
          if [ "$RG_EXISTS" = "true" ]; then
            echo "Resource Group found - proceeding"
          else
            echo "Creating Resource Group..."
            az group create \
              --name "${{ github.event.inputs.resource_group }}" \
              --location "${{ env.LOCATION }}"
          fi
      - name: CheckBicep
        run: |
           ls -la Infra/Deploy/AKS/

      - name: Deploy AKS
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --template-file "Infra/deploy/AKS/main.bicep" \
            --parameters environment="${{ github.event.inputs.environment }}" \
            --parameters location="${{ env.LOCATION }}" \
            --name "aks-${{ github.event.inputs.environment }}-${{ github.run_number }}"