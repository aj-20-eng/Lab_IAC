name: Deploy AI Foundry

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      resource_group:
        description: 'Resource Group name'
        required: true
        default: 'LAB'

permissions:
  id-token: write
  contents: read

env:
  LOCATION: centralindia

jobs:
  deploy-vnet-stage1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Check Bicep
        run: |
           echo "Checking Directory : $(pwd)"
           echo "workspace : $GITHUB_WORKSPACE"
           echo "---repo root---"
           ls -la
           echo "---Target Folder---"
           ls -la Infra/modules/ || echo "Directory not found"

      - name: Validate or Create Resource Group
        run: |
          RG_EXISTS=$(az group exists --name "${{ github.event.inputs.resource_group }}")
          if [ "$RG_EXISTS" = "true" ]; then
            echo "Resource Group found - proceeding"
          else
            echo "Creating Resource Group..."
            az group create \
              --name "${{ github.event.inputs.resource_group }}" \
              --location "${{ env.LOCATION }}"
          fi

      - name: Check Bicep
        run: ls -la Infra/modules

      - name: Deploy VNet
        run: |
          az deployment group create \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --parameters "Infra/modules/ai-foundry/main.bicepparam" \
            --name "vnet-${{ github.event.inputs.environment }}-${{ github.run_number }}" \
            --verbose 2>&1 || \
          az deployment operation group list \
            --resource-group "${{ github.event.inputs.resource_group }}" \
            --name "vnet-${{ github.event.inputs.environment }}-${{ github.run_number }}" \
            --query "[?properties.provisioningState=='Failed'].properties.statusMessage" \
            -o json