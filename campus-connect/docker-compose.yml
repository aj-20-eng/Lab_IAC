services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/aj-20-eng/campus-connect-backend:latest
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: campusconnect
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/aj-20-eng/campus-connect-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend