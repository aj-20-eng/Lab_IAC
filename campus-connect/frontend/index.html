<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .navbar { background: #1a1a2e; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: #e94560; font-size: 1.5rem; }
        .nav-links { display: flex; gap: 1rem; }
        .nav-btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .primary { background: #e94560; color: white; }
        .secondary { background: #16213e; color: white; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #333; }
        .form-group input { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn { padding: 0.7rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; width: 100%; margin-top: 0.5rem; }
        .btn-primary { background: #e94560; color: white; }
        .btn-secondary { background: #1a1a2e; color: white; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .tab { padding: 0.7rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #eee; }
        .tab.active { background: #e94560; color: white; }
        .page { display: none; }
        .page.active { display: block; }
        .user-card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .user-info h3 { color: #1a1a2e; margin-bottom: 0.3rem; }
        .user-info p { color: #666; font-size: 14px; }
        .badge { background: #e8f4fd; color: #2196f3; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .msg-container { height: 400px; overflow-y: auto; padding: 1rem; background: #f9f9f9; border-radius: 8px; margin-bottom: 1rem; }
        .msg-bubble { max-width: 60%; padding: 0.7rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; font-size: 14px; }
        .msg-sent { background: #e94560; color: white; margin-left: auto; border-radius: 12px 12px 0 12px; }
        .msg-received { background: white; color: #333; border-radius: 12px 12px 12px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .msg-name { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }
        .msg-input-row { display: flex; gap: 0.5rem; }
        .msg-input-row input { flex: 1; padding: 0.7rem; border: 1px solid #ddd; border-radius: 8px; }
        .msg-input-row button { padding: 0.7rem 1.5rem; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .alert { padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; font-weight: 500; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .chat-user { padding: 0.8rem 1rem; border-radius: 8px; cursor: pointer; margin-bottom: 0.5rem; background: #f0f2f5; display: flex; justify-content: space-between; align-items: center; }
        .chat-user:hover { background: #e8f4fd; }
        .chat-user.active { background: #e94560; color: white; }
        .chat-layout { display: grid; grid-template-columns: 250px 1fr; gap: 1rem; }
        @media (max-width: 600px) { .chat-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>🎓 CampusConnect</h1>
    <div class="nav-links" id="nav-links">
        <button class="nav-btn secondary" onclick="showPage('login')">Login</button>
        <button class="nav-btn primary" onclick="showPage('register')">Register</button>
    </div>
</nav>

<div class="container">
    <div id="alert-box" style="display:none"></div>

    <!-- Register Page -->
    <div class="page active" id="page-register">
        <div class="card" style="max-width:450px;margin:2rem auto">
            <h2 style="margin-bottom:1.5rem;color:#1a1a2e">Create Account</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label>College</label>
                <input type="text" id="reg-college" placeholder="Enter your college name">
            </div>
            <div class="form-group">
                <label>Branch</label>
                <input type="text" id="reg-branch" placeholder="e.g. Computer Science">
            </div>
            <button class="btn btn-primary" onclick="register()">Register</button>
            <button class="btn btn-secondary" style="margin-top:0.5rem" onclick="showPage('login')">Already have account? Login</button>
        </div>
    </div>

    <!-- Login Page -->
    <div class="page" id="page-login">
        <div class="card" style="max-width:450px;margin:2rem auto">
            <h2 style="margin-bottom:1.5rem;color:#1a1a2e">Login</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <button class="btn btn-secondary" style="margin-top:0.5rem" onclick="showPage('register')">New here? Register</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="page" id="page-dashboard">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('directory')">Directory</button>
            <button class="tab" onclick="switchTab('messages')">Messages</button>
        </div>

        <!-- Directory Tab -->
        <div id="tab-directory">
            <h2 style="margin-bottom:1rem;color:#1a1a2e">Student Directory</h2>
            <div id="users-list"></div>
        </div>

        <!-- Messages Tab -->
        <div id="tab-messages" style="display:none">
            <h2 style="margin-bottom:1rem;color:#1a1a2e">Messages</h2>
            <div class="chat-layout">
                <div>
                    <h4 style="margin-bottom:0.5rem;color:#666">Students</h4>
                    <div id="chat-users-list"></div>
                </div>
                <div class="card" id="chat-box" style="display:none">
                    <h3 id="chat-with-name" style="margin-bottom:1rem;color:#1a1a2e"></h3>
                    <div class="msg-container" id="msg-container"></div>
                    <div class="msg-input-row">
                        <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
                <div class="card" id="chat-placeholder">
                    <p style="color:#999;text-align:center;padding:2rem">Select a student to start chatting</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API = '';
    let currentUser = null;
    let selectedUser = null;
    let msgInterval = null;

    function showAlert(msg, type) {
        const box = document.getElementById('alert-box');
        box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        box.style.display = 'block';
        setTimeout(() => box.style.display = 'none', 3000);
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('tab-directory').style.display = tab === 'directory' ? 'block' : 'none';
        document.getElementById('tab-messages').style.display = tab === 'messages' ? 'block' : 'none';
        if (tab === 'messages') loadChatUsers();
    }

    async function register() {
        const data = {
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
            college: document.getElementById('reg-college').value,
            branch: document.getElementById('reg-branch').value
        };
        const res = await fetch(`${API}/api/register`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (res.ok) { showAlert('Registered successfully! Please login.', 'success'); showPage('login'); }
        else showAlert(result.detail, 'error');
    }

    async function login() {
        const data = {
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value
        };
        const res = await fetch(`${API}/api/login`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (res.ok) {
            currentUser = result;
            document.getElementById('nav-links').innerHTML = `
                <span style="color:#e94560;font-weight:bold">👤 ${currentUser.name}</span>
                <button class="nav-btn secondary" onclick="logout()">Logout</button>`;
            showPage('dashboard');
            loadUsers();
            showAlert('Welcome back, ' + currentUser.name + '!', 'success');
        } else showAlert(result.detail, 'error');
    }

    function logout() {
        currentUser = null;
        selectedUser = null;
        if (msgInterval) clearInterval(msgInterval);
        document.getElementById('nav-links').innerHTML = `
            <button class="nav-btn secondary" onclick="showPage('login')">Login</button>
            <button class="nav-btn primary" onclick="showPage('register')">Register</button>`;
        showPage('register');
    }

    async function loadUsers() {
        const res = await fetch(`${API}/api/users`);
        const users = await res.json();
        const list = document.getElementById('users-list');
        list.innerHTML = users.map(u => `
            <div class="user-card">
                <div class="user-info">
                    <h3>${u.name} ${u.id === currentUser?.id ? '<span style="color:#e94560">(You)</span>' : ''}</h3>
                    <p>${u.email}</p>
                    <p style="margin-top:4px">${u.college} — ${u.branch}</p>
                </div>
                <span class="badge">${u.branch}</span>
            </div>`).join('');
    }

    function loadChatUsers() {
        fetch(`${API}/api/users`).then(r => r.json()).then(users => {
            const list = document.getElementById('chat-users-list');
            list.innerHTML = users.filter(u => u.id !== currentUser?.id).map(u => `
                <div class="chat-user ${selectedUser?.id === u.id ? 'active' : ''}" onclick="openChat(${u.id}, '${u.name}')">
                    <span>${u.name}</span>
                    <span style="font-size:12px;opacity:0.7">${u.branch}</span>
                </div>`).join('');
        });
    }

    function openChat(userId, userName) {
        selectedUser = { id: userId, name: userName };
        document.getElementById('chat-box').style.display = 'block';
        document.getElementById('chat-placeholder').style.display = 'none';
        document.getElementById('chat-with-name').textContent = 'Chat with ' + userName;
        loadChatUsers();
        loadMessages();
        if (msgInterval) clearInterval(msgInterval);
        msgInterval = setInterval(loadMessages, 3000);
    }

    async function loadMessages() {
        if (!currentUser || !selectedUser) return;
        const res = await fetch(`${API}/api/messages/${currentUser.id}/${selectedUser.id}`);
        const msgs = await res.json();
        const container = document.getElementById('msg-container');
        container.innerHTML = msgs.map(m => `
            <div style="display:flex;flex-direction:column;align-items:${m.sender_id === currentUser.id ? 'flex-end' : 'flex-start'}">
                <div class="msg-bubble ${m.sender_id === currentUser.id ? 'msg-sent' : 'msg-received'}">
                    <div class="msg-name">${m.sender_name}</div>
                    ${m.content}
                </div>
            </div>`).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim() || !selectedUser) return;
        await fetch(`${API}/api/messages`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sender_id: currentUser.id, receiver_id: selectedUser.id, content: input.value })
        });
        input.value = '';
        loadMessages();
    }
</script>
</body>
</html>
